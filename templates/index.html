<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TgBackup - 监控面板</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            border-radius: 10px;
            padding: 25px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s;
        }

        .stat-card:hover {
            transform: translateY(-5px);
        }

        .stat-card .label {
            color: #666;
            font-size: 0.9em;
            margin-bottom: 10px;
        }

        .stat-card .value {
            font-size: 2em;
            font-weight: bold;
            color: #667eea;
        }

        .recent-files {
            background: white;
            border-radius: 10px;
            padding: 25px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .recent-files h2 {
            margin-bottom: 20px;
            color: #333;
        }

        .file-list {
            max-height: 400px;
            overflow-y: auto;
        }

        .file-item {
            padding: 15px;
            border-bottom: 1px solid #eee;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .file-item:last-child {
            border-bottom: none;
        }

        .file-info {
            flex: 1;
        }

        .file-name {
            font-weight: 500;
            color: #333;
            margin-bottom: 5px;
        }

        .file-meta {
            font-size: 0.85em;
            color: #999;
        }

        .status {
            display: inline-block;
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 0.9em;
            font-weight: 500;
        }

        .status.running {
            background: #d4edda;
            color: #155724;
        }

        .status.stopped {
            background: #f8d7da;
            color: #721c24;
        }

        .refresh-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1em;
            margin-top: 20px;
        }

        .refresh-btn:hover {
            background: #5568d3;
        }

        @media (max-width: 768px) {
            .stats-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🚀 TgBackup</h1>
            <p>Telegram 媒体备份监控面板</p>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="label">运行状态</div>
                <div class="value" id="status">
                    <span class="status running">运行中</span>
                </div>
            </div>

            <div class="stat-card">
                <div class="label">已下载</div>
                <div class="value" id="downloaded">0</div>
            </div>

            <div class="stat-card">
                <div class="label">已上传</div>
                <div class="value" id="uploaded">0</div>
            </div>

            <div class="stat-card">
                <div class="label">运行时间</div>
                <div class="value" id="uptime" style="font-size: 1.2em;">-</div>
            </div>
        </div>

        <div class="recent-files">
            <h2>📁 最近下载</h2>
            <div class="file-list" id="fileList">
                <div class="file-item">
                    <div class="file-info">
                        <div class="file-name">加载中...</div>
                        <div class="file-meta">请稍候</div>
                    </div>
                </div>
            </div>
            <button class="refresh-btn" onclick="loadData()">🔄 刷新</button>
        </div>
    </div>

    <script>
        function formatSize(bytes) {
            if (bytes === 0) return '0 B';
            const k = 1024;
            const sizes = ['B', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return (bytes / Math.pow(k, i)).toFixed(2) + ' ' + sizes[i];
        }

        function formatTime(isoString) {
            const date = new Date(isoString);
            return date.toLocaleString('zh-CN');
        }

        async function loadData() {
            try {
                // 加载统计数据
                const statsRes = await fetch('/api/stats');
                const statsData = await statsRes.json();

                if (statsData.success) {
                    const stats = statsData.data;
                    document.getElementById('downloaded').textContent = stats.downloaded || 0;
                    document.getElementById('uploaded').textContent = stats.uploaded || 0;
                    document.getElementById('uptime').textContent = stats.uptime || '-';

                    const statusEl = document.getElementById('status');
                    if (stats.running) {
                        statusEl.innerHTML = '<span class="status running">运行中</span>';
                    } else {
                        statusEl.innerHTML = '<span class="status stopped">已停止</span>';
                    }
                }

                // 加载最近文件
                const recentRes = await fetch('/api/recent');
                const recentData = await recentRes.json();

                if (recentData.success) {
                    const files = recentData.data;
                    const fileList = document.getElementById('fileList');

                    if (files.length === 0) {
                        fileList.innerHTML = `
                            <div class="file-item">
                                <div class="file-info">
                                    <div class="file-name">暂无下载记录</div>
                                    <div class="file-meta">开始转发文件或添加频道后会显示在这里</div>
                                </div>
                            </div>
                        `;
                    } else {
                        fileList.innerHTML = files.reverse().map(file => `
                            <div class="file-item">
                                <div class="file-info">
                                    <div class="file-name">${file.name || '未知文件'}</div>
                                    <div class="file-meta">
                                        ${file.channel || '未知频道'} ·
                                        ${formatSize(file.size || 0)} ·
                                        ${formatTime(file.time)}
                                    </div>
                                </div>
                            </div>
                        `).join('');
                    }
                }
            } catch (error) {
                console.error('加载数据失败:', error);
            }
        }

        // 页面加载时获取数据
        loadData();

        // 每 5 秒自动刷新
        setInterval(loadData, 5000);
    </script>
</body>
</html>
