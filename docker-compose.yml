version: '3.8'

services:
  tgbackup:
    image: yannlie/tgbackup:latest  # 使用官方镜像
    # build: .  # 或者本地构建
    container_name: tgbackup
    restart: unless-stopped

    volumes:
      # 配置文件
      - ./config/telegram_config.json:/app/config/telegram_config.json:ro
      - ./config/onedrive_config.json:/app/config/onedrive_config.json:ro

      # 数据目录
      - ./downloads:/app/downloads
      - ./logs:/app/logs
      - ./sessions:/app/sessions

    environment:
      - TZ=Asia/Shanghai
      - PYTHONUNBUFFERED=1

    # 资源限制（可选）
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M

    # 启动命令
    # 默认使用 Bot 控制模式
    command: python telegram_bot_controller.py
    # 如果不需要 Bot 控制，使用下面这行
    # command: python telegram_downloader.py
